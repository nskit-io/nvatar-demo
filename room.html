<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVatar — Virtual Room</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e2e8f0; height: 100vh; overflow: hidden; }
canvas { display: block; }

/* UI overlay */
.ui-overlay { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; z-index: 10; }
.top-bar { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
.top-bar h1 { font-size: 14px; font-weight: 600; }
.top-bar h1 span { color: #6366f1; }
.top-bar .controls { display: flex; gap: 6px; }
.top-bar button { padding: 6px 12px; border: 1px solid #334155; border-radius: 6px; background: rgba(15,23,42,0.8); color: #94a3b8; font-size: 11px; cursor: pointer; backdrop-filter: blur(8px); }
.top-bar button:hover { border-color: #6366f1; color: #e2e8f0; }

/* Chat input at bottom */
.chat-bar { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; z-index: 10; }
.chat-bar input { width: 400px; padding: 12px 16px; border: 1px solid #334155; border-radius: 24px; background: rgba(15,23,42,0.9); color: #e2e8f0; font-size: 14px; outline: none; backdrop-filter: blur(8px); }
.chat-bar input:focus { border-color: #6366f1; }
.chat-bar button { padding: 12px 20px; border: none; border-radius: 24px; background: #6366f1; color: #fff; font-size: 14px; cursor: pointer; }

/* Side panel */
.side-panel { position: absolute; top: 50px; right: 16px; width: 220px; pointer-events: auto; z-index: 10; }
.panel-section { background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 8px; padding: 10px; margin-bottom: 8px; backdrop-filter: blur(8px); }
.panel-section h3 { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
.panel-section .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.panel-section button { padding: 6px; border: 1px solid #334155; border-radius: 4px; background: transparent; color: #94a3b8; font-size: 10px; cursor: pointer; }
.panel-section button:hover { border-color: #6366f1; color: #e2e8f0; }
.panel-section button.active { border-color: #6366f1; color: #6366f1; }

/* Mobile controls (top-right icons) */
.mobile-controls { display: none; position: absolute; top: 10px; right: 10px; z-index: 20; pointer-events: auto; gap: 6px; }
.mobile-controls button { width: 36px; height: 36px; border: 1px solid #334155; border-radius: 8px; background: rgba(15,23,42,0.85); color: #94a3b8; font-size: 16px; cursor: pointer; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
.mobile-controls select { padding: 6px; border: 1px solid #334155; border-radius: 8px; background: rgba(15,23,42,0.85); color: #94a3b8; font-size: 12px; backdrop-filter: blur(8px); }

/* Mobile lookup dialog */
.mobile-lookup-dialog { display: none; position: fixed; top: 15%; left: 5%; right: 5%; max-height: 70vh; background: rgba(10,15,30,0.97); border: 1px solid #334155; border-radius: 16px; z-index: 50; pointer-events: auto; backdrop-filter: blur(16px); flex-direction: column; overflow: hidden; }
.mobile-lookup-dialog .dlg-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #1e293b; }
.mobile-lookup-dialog .dlg-body { flex: 1; overflow-y: auto; padding: 10px; max-height: calc(70vh - 50px); }
.mobile-lookup-dialog .dlg-close { padding: 4px 12px; border: 1px solid #334155; border-radius: 6px; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; }

/* Mobile chat: idle/active/sweep fade */
#chatMessages .chat-msg { transition: opacity 0.4s; }
.chat-idle #chatMessages .chat-msg { opacity: 0; }
.chat-idle #chatMessages .chat-msg.chat-active-msg { opacity: 1; }

#chatMessages.chat-sweep-fade {
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
  -webkit-mask-size: 100% 300%;
  mask-size: 100% 300%;
  animation: maskSweep 5s ease-out forwards;
}
@keyframes maskSweep {
  0% { -webkit-mask-position: 0 100%; mask-position: 0 100%; }
  85% { -webkit-mask-position: 0 0%; mask-position: 0 0%; }
  100% { -webkit-mask-position: 0 0%; mask-position: 0 0%; opacity: 0; }
}

@media (max-width: 768px) {
  .side-panel { display: none !important; }
  .mobile-controls { display: flex; }
  .top-bar .controls { display: none; }
  .top-bar h1 { font-size: 12px; }
  #chatOverlay { left: 8px !important; right: 8px !important; bottom: 8px !important; width: auto !important; }
  #chatOverlay input { font-size: 14px; flex: 1 !important; min-width: 0; }
  #chatOverlay > div:last-child { width: 100%; }
  #lookupBadge { top: 10px; left: 10px; font-size: 14px; padding: 8px 12px; }
  #lookupPanel { display: none !important; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s;">
  <h2 style="font-size:20px;color:#fff;margin-bottom:12px;"><span style="color:#6366f1;">NVatar</span> Loading...</h2>
  <div style="width:240px;height:4px;background:#1e293b;border-radius:4px;overflow:hidden;">
    <div id="loadingBar" style="width:0%;height:100%;background:#6366f1;border-radius:4px;transition:width 0.3s;"></div>
  </div>
  <div id="loadingText" style="margin-top:8px;font-size:12px;color:#64748b;"></div>
</div>

<div class="ui-overlay">
  <div class="top-bar">
    <h1 onclick="location.href='index.html'" style="cursor:pointer;"><span>NVatar</span> Virtual Room</h1>
    <div class="controls">
      <button data-i18n="lobby" onclick="location.href='index.html'" style="padding:4px 10px;border:1px solid #334155;border-radius:6px;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;">← Lobby</button>
      <span data-i18n="dblClickMove" style="font-size:11px;color:#64748b;">Double-click: Move</span>
      <button data-i18n="light" onclick="toggleLight()">💡 Light</button>
      <button data-i18n="camReset" onclick="resetView()">📷 Reset</button>
    </div>
  </div>
</div>

<div class="side-panel">
  <div class="panel-section">
    <h3 data-i18n="langLabel">Language</h3>
    <div class="btn-grid">
      <select id="langSelect" onchange="window._changeLang(this.value)" style="padding:6px;border:1px solid #334155;border-radius:4px;background:rgba(15,23,42,0.8);color:#94a3b8;font-size:10px;width:100%;">
        <option value="ko">🇰🇷 한국어</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh">🇨🇳 中文</option>
      </select>
    </div>
  </div>
  <div class="panel-section">
    <h3 data-i18n="voiceLabel">Voice</h3>
    <div class="btn-grid">
      <button id="btnTTS" onclick="window._toggleTTS(this)" style="background:rgba(99,102,241,0.3);"></button>
    </div>
    <select id="voiceSelect" onchange="window._changeVoice(this.value)" style="width:100%;margin-top:6px;padding:6px 8px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:11px;">
      <option value="">기본 음성</option>
    </select>
  </div>
</div>

<!-- Mobile controls (top-right) -->
<div class="mobile-controls">
  <select id="mobileLangSelect" onchange="window._changeLang(this.value)">
    <option value="ko">🇰🇷</option>
    <option value="ja">🇯🇵</option>
    <option value="en">🇺🇸</option>
    <option value="zh">🇨🇳</option>
  </select>
  <button id="mobileTTS" onclick="window._toggleTTS(document.getElementById('btnTTS'))">🔊</button>
  <button onclick="openVoiceSheet()">🎙</button>
</div>

<!-- Voice bottom sheet (mobile) -->
<div id="voiceSheetBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;" onclick="closeVoiceSheet()"></div>
<div id="voiceSheet" style="position:fixed;left:0;right:0;bottom:0;max-height:50vh;background:#1e293b;border-top:1px solid #475569;border-radius:14px 14px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.3s ease;display:flex;flex-direction:column;">
  <div style="padding:10px 0 6px;text-align:center;" onclick="closeVoiceSheet()"><div style="width:36px;height:4px;background:#475569;border-radius:2px;margin:0 auto;"></div></div>
  <div style="padding:0 16px 8px;font-size:13px;font-weight:600;color:#e2e8f0;border-bottom:1px solid #334155;">🎙 Voice</div>
  <div id="voiceSheetBody" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;"></div>
</div>

<!-- Mobile lookup dialog -->
<div id="mobileLookupDialog" class="mobile-lookup-dialog">
  <div class="dlg-header">
    <span style="font-size:13px;font-weight:700;color:#e2e8f0;">🔍</span>
    <button class="dlg-close" onclick="closeMobileLookup()">✕</button>
  </div>
  <div id="mobileLookupBody" class="dlg-body"></div>
</div>

<!-- Lookup badge + panel (SDK demo) -->
<div id="lookupBadge" onclick="toggleLookupPanel(event)" style="position:absolute;top:48px;left:16px;display:none;padding:6px 14px;border-radius:20px;background:rgba(99,102,241,0.9);color:#fff;font-size:11px;font-weight:700;cursor:pointer;pointer-events:auto;z-index:30;backdrop-filter:blur(8px);transition:all 0.3s;">
  <span data-i18n="lookupResult"></span> <span id="lookupBadgeCount">0</span><span data-i18n-count="lookupCount"></span>
</div>

<div id="lookupPanel" style="position:absolute;top:80px;left:16px;width:340px;max-height:60vh;display:none;flex-direction:column;background:rgba(10,15,30,0.95);border:1px solid #334155;border-radius:12px;pointer-events:auto;z-index:30;backdrop-filter:blur(12px);overflow:hidden;">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #1e293b;">
    <span data-i18n="lookupHeader" style="font-size:12px;font-weight:700;color:#e2e8f0;"></span>
    <button data-i18n="close" onclick="toggleLookupPanel(event)" style="padding:2px 8px;border:1px solid #334155;border-radius:4px;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;"></button>
  </div>
  <div id="lookupList" style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;max-height:50vh;"></div>
</div>

<!-- Chat overlay (left side) -->
<div id="chatOverlay" style="position:absolute;bottom:16px;left:16px;width:340px;max-height:60vh;display:flex;flex-direction:column;pointer-events:auto;z-index:10;">
  <div id="chatMessages" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:8px;max-height:45vh;">
  </div>
  <div style="display:flex;gap:6px;padding:4px;align-items:center;">
    <input id="chatInput" placeholder="" style="flex:1;padding:10px 14px;border:1px solid #334155;border-radius:20px;background:rgba(15,23,42,0.9);color:#e2e8f0;font-size:13px;outline:none;backdrop-filter:blur(8px);">
    <button id="micBtn" onclick="toggleMic()" style="padding:8px 12px;border:1px solid #334155;border-radius:20px;background:rgba(15,23,42,0.9);color:#94a3b8;font-size:16px;cursor:pointer;backdrop-filter:blur(8px);transition:all 0.2s;">🎤</button>
    <span id="micTimer" style="font-size:10px;color:#ef4444;font-variant-numeric:tabular-nums;min-width:28px;display:none;">0:00</span>
    <button data-i18n="send" onclick="sendChat()" style="padding:10px 16px;border:none;border-radius:20px;background:#6366f1;color:#fff;font-size:13px;cursor:pointer;"></button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="./js/room/main.js"></script>
</body>
</html>
