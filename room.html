<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVatar — Virtual Room</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e2e8f0; height: 100vh; overflow: hidden; }
canvas { display: block; }

/* UI overlay */
.ui-overlay { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; z-index: 10; }
.top-bar { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
.top-bar h1 { font-size: 14px; font-weight: 600; }
.top-bar h1 span { color: #6366f1; }
.top-bar .controls { display: flex; gap: 6px; }
.top-bar button { padding: 6px 12px; border: 1px solid #334155; border-radius: 6px; background: rgba(15,23,42,0.8); color: #94a3b8; font-size: 11px; cursor: pointer; backdrop-filter: blur(8px); }
.top-bar button:hover { border-color: #6366f1; color: #e2e8f0; }

/* Chat input at bottom */
.chat-bar { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; z-index: 10; }
.chat-bar input { width: 400px; padding: 12px 16px; border: 1px solid #334155; border-radius: 24px; background: rgba(15,23,42,0.9); color: #e2e8f0; font-size: 14px; outline: none; backdrop-filter: blur(8px); }
.chat-bar input:focus { border-color: #6366f1; }
.chat-bar button { padding: 12px 20px; border: none; border-radius: 24px; background: #6366f1; color: #fff; font-size: 14px; cursor: pointer; }

/* Side panel */
.side-panel { position: absolute; top: 50px; right: 16px; width: 220px; pointer-events: auto; z-index: 10; }
.panel-section { background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 8px; padding: 10px; margin-bottom: 8px; backdrop-filter: blur(8px); }
.panel-section h3 { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
.panel-section .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.panel-section button { padding: 6px; border: 1px solid #334155; border-radius: 4px; background: transparent; color: #94a3b8; font-size: 10px; cursor: pointer; }
.panel-section button:hover { border-color: #6366f1; color: #e2e8f0; }
.panel-section button.active { border-color: #6366f1; color: #6366f1; }

/* Mobile controls (top-right icons) */
.mobile-controls { display: none; position: absolute; top: 10px; right: 10px; z-index: 20; pointer-events: auto; gap: 6px; }
.mobile-controls button { width: 36px; height: 36px; border: 1px solid #334155; border-radius: 8px; background: rgba(15,23,42,0.85); color: #94a3b8; font-size: 16px; cursor: pointer; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
.mobile-controls select { padding: 6px; border: 1px solid #334155; border-radius: 8px; background: rgba(15,23,42,0.85); color: #94a3b8; font-size: 12px; backdrop-filter: blur(8px); }

.mobile-lookup-dialog { display: none; position: fixed; top: 15%; left: 5%; right: 5%; max-height: 70vh; background: rgba(10,15,30,0.97); border: 1px solid #334155; border-radius: 16px; z-index: 50; pointer-events: auto; backdrop-filter: blur(16px); flex-direction: column; overflow: hidden; }
.mobile-lookup-dialog .dlg-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #1e293b; }
.mobile-lookup-dialog .dlg-body { flex: 1; overflow-y: auto; padding: 10px; max-height: calc(70vh - 50px); }
.mobile-lookup-dialog .dlg-close { padding: 4px 12px; border: 1px solid #334155; border-radius: 6px; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; }

/* Mobile chat: idle/active/sweep fade */
#chatMessages .chat-msg { transition: opacity 0.4s; }
.chat-idle #chatMessages .chat-msg { opacity: 0; }
.chat-idle #chatMessages .chat-msg.chat-active-msg { opacity: 1; }

/* Gradient sweep: mask slides top→bottom over 5s */
#chatMessages.chat-sweep-fade {
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
  -webkit-mask-size: 100% 300%;
  mask-size: 100% 300%;
  animation: maskSweep 5s ease-out forwards;
}
@keyframes maskSweep {
  0% { -webkit-mask-position: 0 100%; mask-position: 0 100%; }
  85% { -webkit-mask-position: 0 0%; mask-position: 0 0%; }
  100% { -webkit-mask-position: 0 0%; mask-position: 0 0%; opacity: 0; }
}

@media (max-width: 768px) {
  .side-panel { display: none !important; }
  .mobile-controls { display: flex; }
  .top-bar .controls { display: none; }
  .top-bar h1 { font-size: 12px; }
  #chatOverlay { left: 8px !important; right: 8px !important; bottom: 8px !important; width: auto !important; }
  #chatOverlay input { font-size: 14px; flex: 1 !important; min-width: 0; }
  #chatOverlay > div:last-child { width: 100%; }
  #lookupBadge { top: 10px; left: 10px; font-size: 14px; padding: 8px 12px; }
  #lookupPanel { display: none !important; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s;">
  <h2 style="font-size:20px;color:#fff;margin-bottom:12px;"><span style="color:#6366f1;">NVatar</span> Loading...</h2>
  <div style="width:240px;height:4px;background:#1e293b;border-radius:4px;overflow:hidden;">
    <div id="loadingBar" style="width:0%;height:100%;background:#6366f1;border-radius:4px;transition:width 0.3s;"></div>
  </div>

</div>

<div class="ui-overlay">
  <div class="top-bar">
    <h1><span>NVatar</span> Virtual Room</h1>
    <div class="controls">
      <button data-i18n="lobby" onclick="location.href='index.html'" style="padding:4px 10px;border:1px solid #334155;border-radius:6px;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;">← Lobby</button>

</div>

<div class="side-panel">

    </div>

</div>

<!-- Mobile controls (top-right) -->
<div class="mobile-controls">

  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #1e293b;">
    <span data-i18n="lookupHeader" style="font-size:12px;font-weight:700;color:#e2e8f0;"></span>
    <button data-i18n="close" onclick="toggleLookupPanel(event)" style="padding:2px 8px;border:1px solid #334155;border-radius:4px;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;"></button>

function _applyI18nUI() {

// --- Init ---
function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 2.0, 3.0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  // Bubble overlay container (pure DOM, separate from 3D)
  const bubbleLayer = document.createElement('div');
  bubbleLayer.id = 'bubbleLayer';
  bubbleLayer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:5;';
  document.body.appendChild(bubbleLayer);

  // Controls
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1, 0);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI * 0.55;
  controls.minDistance = 1.5;
  controls.maxDistance = 8;

  // Debug: log camera state after orbit drag
  controls.addEventListener('end', () => {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    console.log('[orbit end]',
      'cam:', camera.position.x.toFixed(2), camera.position.y.toFixed(2), camera.position.z.toFixed(2),
      '| target:', controls.target.x.toFixed(2), controls.target.y.toFixed(2), controls.target.z.toFixed(2),
      '| dir:', dir.x.toFixed(2), dir.y.toFixed(2), dir.z.toFixed(2)
    );
  });

  // Build room
  buildRoom();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

// --- Room ---
let roomModel = null;
const ROOM_OBJECTS = []; // for collision detection

function buildRoom() {
  // Ambient light
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  // Directional light (sun through window)
  const dirLight = new THREE.DirectionalLight(0xFFE4B5, 0.8);
  dirLight.position.set(3, 5, 2);
  dirLight.castShadow = true;
  scene.add(dirLight);
  roomLights.push(dirLight);

  // Point light (warm room light)
  const pointLight = new THREE.PointLight(0xFFE4B5, 0.5, 15);
  pointLight.position.set(0, 3, 0);
  scene.add(pointLight);
  roomLights.push(pointLight);

  // Load GLTF room model
  //
  // Position system:
  //   - Everything lives at Y=0 ground plane
  //   - Avatar position.y is NEVER modified (always 0)
  //   - Room is scaled and positioned so its visual floor = Y=0
  //   - Double-click raycasts onto Y=0 plane
  //   - Walk only modifies X/Z, never Y
  //
  _updateLoading(20, t('loadingRoom'));
  const roomLoader = new GLTFLoader();
  roomLoader.load('https://nvatar.nskit.io/static/room/cozy_living_room/scene.gltf', (gltf) => {
    roomModel = gltf.scene;
    scene.add(roomModel);

    // Step 1: Measure raw model
    const rawBox = new THREE.Box3().setFromObject(roomModel);
    const rawSize = rawBox.getSize(new THREE.Vector3());
    console.log(`[Room] Raw: ${rawSize.x.toFixed(2)} x ${rawSize.y.toFixed(2)} x ${rawSize.z.toFixed(2)}`);

    // Step 2: Uniform scale — room height ~4.5 units (VRM ~1.5 = 1/3 of ceiling)
    const scale = 4.5 / rawSize.y;
    roomModel.scale.setScalar(scale);

    // Simple approach: scale, then manually adjust Y until floor = Y=0
    // Bbox min.y after scale tells us where the bottom is
    roomModel.updateMatrixWorld(true);
    const scaledBox = new THREE.Box3().setFromObject(roomModel);
    const center = scaledBox.getCenter(new THREE.Vector3());

    // Rotate room -90° for wider view
    roomModel.rotation.y = -Math.PI / 2;

    // Center XZ (recalculate after rotation)
    roomModel.updateMatrixWorld(true);
    const rotatedBox = new THREE.Box3().setFromObject(roomModel);
    const rotatedCenter = rotatedBox.getCenter(new THREE.Vector3());
    roomModel.position.x = -rotatedCenter.x;
    roomModel.position.z = -rotatedCenter.z - 1.5; // push room back so character appears more forward
    // bbox min.y includes outdoor environment objects (trees, ground below window)
    // Actual room floor is HIGHER than bbox min. Manually offset:
    // We use bbox min + add extra to reach the real indoor floor level
    const FLOOR_OFFSET = 0.90; // indoor floor is above bbox min (outdoor env objects below)
    roomModel.position.y = -rotatedBox.min.y - FLOOR_OFFSET;

    roomModel.updateMatrixWorld(true);

    // Shadows + collect indoor furniture for collision
    roomModel.traverse(n => {
      if (n.isMesh) {
        n.receiveShadow = true;
        n.castShadow = true;
        // Collect collision objects: indoor furniture only
        if (n.geometry) {
          const objBox = new THREE.Box3().setFromObject(n);
          const objSize = objBox.getSize(new THREE.Vector3());
          // Indoor furniture: sits above floor (Y>0), not too big (not walls/floor), has some height
          if (objBox.min.y >= -0.1 && objSize.y > 0.3 && objSize.y < 3 && objSize.x < 4 && objSize.z < 4) {
            ROOM_OBJECTS.push(objBox);
          }
        }
      }
    });

    // Update bounds (no collision for now — gets in the way)
    const finalBox = new THREE.Box3().setFromObject(roomModel);
    // Bounds: use 60% of bbox (indoor area is smaller than full bbox with outdoor env)
    const halfX = (finalBox.max.x - finalBox.min.x) * 0.3;
    const halfZ = (finalBox.max.z - finalBox.min.z) * 0.3;
    ROOM_BOUNDS.minX = -halfX;
    ROOM_BOUNDS.maxX = halfX;
    ROOM_BOUNDS.minZ = finalBox.min.z + 0.5; // keep more room behind (room pushed back)
    ROOM_BOUNDS.maxZ = finalBox.max.z * 0.4;

    console.log(`[Room] Placed: bounds X[${ROOM_BOUNDS.minX.toFixed(1)}~${ROOM_BOUNDS.maxX.toFixed(1)}] Z[${ROOM_BOUNDS.minZ.toFixed(1)}~${ROOM_BOUNDS.maxZ.toFixed(1)}], ${ROOM_OBJECTS.length} collision objects`);
  }, undefined, (err) => {
    console.error('[Room] Failed to load GLTF:', err);
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 8),
      new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);
    roomModel = floor; // mark as loaded for _waitForRoom
  });
}

// --- Loading ---
function _updateLoading(pct, text) {
  const bar = document.getElementById('loadingBar');
  const txt = document.getElementById('loadingText');
  if (bar) bar.style.width = pct + '%';
  if (txt) txt.textContent = text;
}
function _hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 500); }
}
function _waitForRoom(callback) {
  // Wait until room model is loaded (or timeout 15s)
  let waited = 0;
  const check = setInterval(() => {
    waited += 100;
    if (roomModel || waited > 15000) {
      clearInterval(check);
      callback();
    }
  }, 100);
}

async function _loadVRM(url, index) {
  _updateLoading(10, t('loadingAvatar'));
  try {
    const vrmModule = await import('https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js');
    const { VRMLoaderPlugin } = vrmModule;

    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    loader.load(url, (gltf) => {
      const vrm = gltf.userData.vrm;
      if (!vrm) return;

      // Remove old avatar at this index
      if (avatars[index]) {
        scene.remove(avatars[index].scene);
        if (avatars[index].bubble) scene.remove(avatars[index].bubble);
      }

      const model = gltf.scene;
      model.rotation.y = Math.PI;

      // Avatar at Y=0 — room floor is aligned to Y=0
      model.position.set(0, 0, 0);
      model.castShadow = true;
      model.traverse(n => { if (n.isMesh) n.castShadow = true; });
      model.visible = false;  // Hide until idle is ready
      scene.add(model);

      avatars[index] = { vrm, scene: model, blinkTimer: 0, nextBlink: 2 + Math.random() * 4, _activeBubbles: [], _feetOffset: 0 };
      console.log('[Room] Avatar loaded at index', index);

      // Auto-load Mixamo animations, then wait for room, reveal + welcome
      if (index === 0) {
        _updateLoading(40, t('loadingAnim'));
        loadMixamoAnimations(vrm).then(() => {
          _updateLoading(70, t('waitingRoom'));
          _waitForRoom(() => {
            // Place avatar on actual room floor
            // Avatar stays at Y=0 — room floor is at Y=0
            console.log(`[Avatar] Ready at Y=0`);
            model.visible = true;
            _updateLoading(100, t('ready'));
            setTimeout(_hideLoading, 300);
            startRoaming();
            startMonologue();
            // Connect chat + welcome after everything is visible
            if (paramAvatarId) {
              connectChat(paramAvatarId);
            }
          });
        }).catch(() => {
          model.visible = true;
          _hideLoading();
        });
      } else {
        model.visible = true;
      }
    });
  } catch(e) {
    console.error('[Room] VRM load error:', e);
  }
}

window.loadVRM = function(url, index = 0) { _loadVRM(url, index); };
window.loadLocalVRM = function(event) {
  const file = event.target.files[0];
  if (file) _loadVRM(URL.createObjectURL(file), 0);
};

// --- Speech Bubble System (Pure DOM, separate from 3D) ---
let bubbleIdCounter = 0;
let _bubbleQueue = [];
let _bubbleProcessing = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Project 3D point to 2D screen coordinates
function toScreen(position3D) {
  const vec = position3D.clone().project(camera);
  return {
    x: (vec.x * 0.5 + 0.5) * window.innerWidth,
    y: (-vec.y * 0.5 + 0.5) * window.innerHeight,
  };
}

// Update all active bubble positions each frame
function updateBubblePositions() {
  avatars.forEach((avatar, i) => {
    if (!avatar || !avatar.scene || !avatar._bubbleDivs) return;
    // Get head position in world space
    const headPos = new THREE.Vector3(0, 1.85, 0);
    avatar.scene.localToWorld(headPos);
    const screen = toScreen(headPos);

    // Face position (for fallback when bubble goes off-screen)
    const facePos = new THREE.Vector3(0, 1.55, 0);
    avatar.scene.localToWorld(facePos);
    const faceScreen = toScreen(facePos);

    avatar._bubbleDivs.forEach(div => {
      if (div.style.opacity === '0') return;
      const bubbleH = div.offsetHeight || 40;
      const bubbleW = div.offsetWidth || 160;
      const pad = 8;
      const vw = window.innerWidth;
      const halfW = bubbleW / 2;

      let bx = screen.x;
      let by = screen.y - bubbleH;

      const headOffScreen = screen.x < -50 || screen.x > vw + 50 || screen.y < -50 || screen.y > window.innerHeight + 50;
      const tooNarrow = (bx - halfW < pad && bx + halfW > vw - pad);

      if (headOffScreen || tooNarrow) {
        bx = vw / 2;
        by = pad + 10;
      } else {
        if (by < pad) by = pad;
        if (by + bubbleH > faceScreen.y) by = faceScreen.y - bubbleH;
        if (bx - halfW < pad) bx = halfW + pad;
        if (bx + halfW > vw - pad) bx = vw - halfW - pad;
      }

      div.style.left = bx + 'px';
      div.style.top = by + 'px';
      div.style.transform = 'translate(-50%, 0)';
    });
  });
}

function showBubble(index, text) {
  _bubbleQueue.push({ index, text });
  if (!_bubbleProcessing) processNextBubble();
}

async function processNextBubble() {
  if (_bubbleQueue.length === 0) { _bubbleProcessing = false; return; }
  _bubbleProcessing = true;

  const { index, text } = _bubbleQueue.shift();
  const avatar = avatars[index];
  if (!avatar || !avatar.scene) { _bubbleProcessing = false; processNextBubble(); return; }
  if (!avatar._bubbleDivs) avatar._bubbleDivs = [];

  // Fade out previous bubble
  if (avatar._currentBubbleDiv) {
    const old = avatar._currentBubbleDiv;
    old.style.transition = 'all 1.2s ease-out';
    old.style.transform = 'translate(-50%, -100%) translateY(-40px)';
    old.style.opacity = '0';
    setTimeout(() => { old.remove(); avatar._bubbleDivs = avatar._bubbleDivs.filter(d => d !== old); }, 1300);
    await sleep(300);
  }

  // Cancel typing
  if (avatar._bubbleTimer) { clearInterval(avatar._bubbleTimer); avatar._bubbleTimer = null; }

  // Create new DOM bubble
  const id = ++bubbleIdCounter;
  const div = document.createElement('div');
  div.id = 'bubble-' + id;
  const maxBubbleW = Math.min(200, window.innerWidth * 0.6);
  div.style.cssText = `position:absolute;transform:translate(-50%,-100%);background:rgba(30,41,59,0.95);color:#e2e8f0;padding:8px 12px;border-radius:12px;font-size:12px;max-width:${maxBubbleW}px;line-height:1.5;border:1px solid #334155;backdrop-filter:blur(4px);font-family:-apple-system,sans-serif;transition:all 1s ease-out;opacity:1;pointer-events:none;`;
  document.getElementById('bubbleLayer').appendChild(div);

  avatar._bubbleDivs.push(div);
  avatar._currentBubbleDiv = div;

  // Typing animation
  await new Promise(resolve => {
    let i = 0;
    div.textContent = '';
    avatar._bubbleTimer = setInterval(() => {
      if (i < text.length) {
        div.textContent += text[i];
        i++;
      } else {
        clearInterval(avatar._bubbleTimer);
        avatar._bubbleTimer = null;
        resolve();
      }
    }, 50);
  });

  // Hold 2s, then notify bubble complete
  await sleep(2000);
  _onBubbleComplete();

  // Auto fade-out after 60s of silence
  if (avatar._autoFadeTimer) clearTimeout(avatar._autoFadeTimer);
  avatar._autoFadeTimer = setTimeout(() => {
    if (avatar._currentBubbleDiv && avatar._currentBubbleDiv === div) {
      div.style.transition = 'all 1.5s ease-out';
      div.style.transform = 'translate(-50%, -100%) translateY(-30px)';
      div.style.opacity = '0';
      setTimeout(() => {
        div.remove();
        avatar._bubbleDivs = avatar._bubbleDivs.filter(d => d !== div);
        if (avatar._currentBubbleDiv === div) avatar._currentBubbleDiv = null;
      }, 1600);
    }
  }, 60000);

  _bubbleProcessing = false;
  if (_bubbleQueue.length > 0) processNextBubble();
}

// --- Mood detection from text ---
const MOOD_PATTERNS = {
  happy: [
    '😊','😆','😄','😁','🤩','💖','💕','✨','🎉','🥳','🌸','🚀','💪','👍',
    'ㅋㅋ','헤헤','하하','ㅎㅎ','기쁘','기분 좋','좋아요','멋져','대박','완전'
  ],
  sad: [
    '😢','😭','🥺','😞','💔',
    'ㅠㅠ','ㅜㅜ','슬프','슬퍼','힘들','괜찮','미안','아쉬'
  ],
  think: [
    '🤔','💭','음...','글쎄','어디보자','생각해'
  ],
};

const GESTURE_PATTERNS = {
  wave:     ['안녕','반가','👋','하이','헬로'],
  laugh:    ['ㅋㅋㅋ','하하하','😂','🤣','웃겨','빵터'],
  cheer:    ['🎉','🥳','축하','대박','최고','짱'],
  surprised:['헐','😮','😲','놀라','진짜?','대박'],
  nod:      ['그렇지','맞아','응응','ㅇㅇ','동의'],
};

function detectGestureFromText(text) {
  for (const [gesture, patterns] of Object.entries(GESTURE_PATTERNS)) {
    for (const p of patterns) {
      if (text.includes(p)) return gesture;
    }
  }
  return null;
}

function detectMoodFromText(text) {
  // Count matches per mood, pick strongest
  let best = null;
  let bestCount = 0;
  for (const [mood, patterns] of Object.entries(MOOD_PATTERNS)) {
    let count = 0;
    for (const p of patterns) {
      if (text.includes(p)) count++;
    }
    if (count > bestCount) {
      bestCount = count;
      best = mood;
    }
  }
  return bestCount > 0 ? best : null;
}

// Expression auto-revert timer
let _moodRevertTimer = null;
const MOOD_HOLD_SEC = 8;  // 표정 유지 시간
const MOOD_FADE_SEC = 2;  // idle로 돌아가는 페이드 시간

window.setMood = function(mood, holdSec) {
  const hold = holdSec || MOOD_HOLD_SEC;

  // 1) FBX body animation crossfade
  if (walkState !== 'walking') {
    _crossfadeToMood(mood === 'idle' ? 'idle' : mood);
  }

  // 2) VRM face expression
  avatars.forEach((avatar, i) => {
    if (!avatar || !avatar.vrm) return;
    const vrm = avatar.vrm;
    const em = vrm.expressionManager;
    if (!em) return;

    for (const name of Object.keys(em.expressionMap || {})) {
      if (name === 'blink') continue;
      em.setValue(name, 0);
    }

    switch(mood) {
      case 'happy': em.setValue('happy', 1); break;
      case 'sad': em.setValue('sad', 1); break;
      case 'wave':
        em.setValue('happy', 0.5);
        if (vrm.humanoid) {
          const arm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
          if (arm) { avatar._waveAnim = { bone: arm, start: elapsed, duration: 2 }; }
        }
        break;
      case 'think': break;  // FBX handles body, face stays neutral
      case 'nod':
        if (vrm.humanoid) {
          const head = vrm.humanoid.getNormalizedBoneNode('head');
          if (head) { avatar._nodAnim = { bone: head, start: elapsed, duration: 1.5 }; }
        }
        break;
    }
    em.update();
  });

  // 3) Auto-revert to idle
  if (_moodRevertTimer) clearTimeout(_moodRevertTimer);
  if (mood !== 'idle') {
    _moodRevertTimer = setTimeout(() => {
      _fadeToIdle();
      _moodRevertTimer = null;
    }, hold * 1000);
  }
};

const CROSSFADE_SEC = 0.5;

function _crossfadeToMood(targetMood) {
  if (!currentMixer) return;
  const targetAction = moodActions[targetMood] || moodActions.idle;
  if (!targetAction) return;
  if (currentMoodName === targetMood) return;

  targetAction.reset().play();
  if (currentAction && currentAction !== targetAction) {
    targetAction.crossFadeFrom(currentAction, CROSSFADE_SEC, true);
  }
  currentAction = targetAction;
  currentMoodName = targetMood;
}

function _fadeToIdle() {
  // Body: crossfade back to idle FBX
  _crossfadeToMood('idle');

  // Face: gradual expression fade
  const steps = 10;
  const intervalMs = (MOOD_FADE_SEC * 1000) / steps;
  let step = 0;
  const fade = setInterval(() => {
    step++;
    const t = step / steps;
    avatars.forEach(avatar => {
      if (!avatar || !avatar.vrm) return;
      const em = avatar.vrm.expressionManager;
      if (!em) return;
      for (const name of Object.keys(em.expressionMap || {})) {
        if (name === 'blink') continue;
        const cur = em.getValue(name);
        if (cur > 0) em.setValue(name, cur * (1 - t));
      }
      em.update();
    });
    if (step >= steps) clearInterval(fade);
  }, intervalMs);
}

const mixamoClips = {}; // { idle: AnimationClip, walking: AnimationClip }
let currentMixer = null;
let currentAction = null;
let idleAction = null;
let walkAction = null;

// Official Mixamo→VRM rig map (from pixiv/three-vrm)
const mixamoVRMRigMap = {
  mixamorigHips:'hips',mixamorigSpine:'spine',mixamorigSpine1:'chest',mixamorigSpine2:'upperChest',
  mixamorigNeck:'neck',mixamorigHead:'head',
  mixamorigLeftShoulder:'leftShoulder',mixamorigLeftArm:'leftUpperArm',mixamorigLeftForeArm:'leftLowerArm',mixamorigLeftHand:'leftHand',
  mixamorigLeftHandThumb1:'leftThumbMetacarpal',mixamorigLeftHandThumb2:'leftThumbProximal',mixamorigLeftHandThumb3:'leftThumbDistal',
  mixamorigLeftHandIndex1:'leftIndexProximal',mixamorigLeftHandIndex2:'leftIndexIntermediate',mixamorigLeftHandIndex3:'leftIndexDistal',
  mixamorigLeftHandMiddle1:'leftMiddleProximal',mixamorigLeftHandMiddle2:'leftMiddleIntermediate',mixamorigLeftHandMiddle3:'leftMiddleDistal',
  mixamorigLeftHandRing1:'leftRingProximal',mixamorigLeftHandRing2:'leftRingIntermediate',mixamorigLeftHandRing3:'leftRingDistal',
  mixamorigLeftHandPinky1:'leftLittleProximal',mixamorigLeftHandPinky2:'leftLittleIntermediate',mixamorigLeftHandPinky3:'leftLittleDistal',
  mixamorigRightShoulder:'rightShoulder',mixamorigRightArm:'rightUpperArm',mixamorigRightForeArm:'rightLowerArm',mixamorigRightHand:'rightHand',
  mixamorigRightHandThumb1:'rightThumbMetacarpal',mixamorigRightHandThumb2:'rightThumbProximal',mixamorigRightHandThumb3:'rightThumbDistal',
  mixamorigRightHandIndex1:'rightIndexProximal',mixamorigRightHandIndex2:'rightIndexIntermediate',mixamorigRightHandIndex3:'rightIndexDistal',
  mixamorigRightHandMiddle1:'rightMiddleProximal',mixamorigRightHandMiddle2:'rightMiddleIntermediate',mixamorigRightHandMiddle3:'rightMiddleDistal',
  mixamorigRightHandRing1:'rightRingProximal',mixamorigRightHandRing2:'rightRingIntermediate',mixamorigRightHandRing3:'rightRingDistal',
  mixamorigRightHandPinky1:'rightLittleProximal',mixamorigRightHandPinky2:'rightLittleIntermediate',mixamorigRightHandPinky3:'rightLittleDistal',
  mixamorigLeftUpLeg:'leftUpperLeg',mixamorigLeftLeg:'leftLowerLeg',mixamorigLeftFoot:'leftFoot',mixamorigLeftToeBase:'leftToes',
  mixamorigRightUpLeg:'rightUpperLeg',mixamorigRightLeg:'rightLowerLeg',mixamorigRightFoot:'rightFoot',mixamorigRightToeBase:'rightToes',
};

// Official loadMixamoAnimation (adapted from pixiv/three-vrm examples)
function loadMixamoAnimation(url, vrm, name) {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('No animation clip found');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // Hips height scaling
    const motionHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = motionHipsNode ? motionHipsNode.position.y : 1;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose?.hips?.position?.[1] || 1;
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      const trackSplitted = track.name.split('.');
      const mixamoRigName = trackSplitted[0];
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      if (vrmNodeName != null) {
        const propertyName = trackSplitted[1];

        // Rest-pose rotation compensation
        mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
        mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

        if (track instanceof THREE.QuaternionKeyframeTrack) {
          for (let i = 0; i < track.values.length; i += 4) {
            const flatQuaternion = track.values.slice(i, i + 4);
            _quatA.fromArray(flatQuaternion);
            _quatA.premultiply(parentRestWorldRotation).multiply(restRotationInverse);
            _quatA.toArray(flatQuaternion);
            flatQuaternion.forEach((v, index) => { track.values[index + i] = v; });
          }
          tracks.push(new THREE.QuaternionKeyframeTrack(
            `${vrmNodeName}.${propertyName}`,
            track.times,
            track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
          ));
        } else if (track instanceof THREE.VectorKeyframeTrack) {
          const value = track.values.map((v, i) =>
            (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale
          );
          tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, value));
        }
      }
    });

    // Keep Hips Y position (grounding + breathing), remove XZ (movement controlled by code)
    const hipsNodeName = vrm.humanoid?.getNormalizedBoneNode('hips')?.name;
    const filteredTracks = tracks.filter(t => {
      if (!t.name.endsWith('.position')) return true; // keep all rotation tracks
      if (hipsNodeName && t.name.startsWith(hipsNodeName + '.')) {
        // Hips position: zero out X/Z, keep only Y
        for (let i = 0; i < t.values.length; i += 3) {
          t.values[i] = 0;     // X = 0 (no horizontal drift)
          // t.values[i+1] kept  // Y = original (grounding)
          t.values[i+2] = 0;   // Z = 0 (no horizontal drift)
        }
        return true;
      }
      return false; // remove other bone position tracks
    });
    const retargetedClip = new THREE.AnimationClip(name, clip.duration, filteredTracks);
    mixamoClips[name] = retargetedClip;
    console.log(`[Mixamo] Loaded "${name}" (${tracks.length} tracks, ${clip.duration.toFixed(1)}s)`);
    return retargetedClip;
  });
}

// Post-animation arm spread adjustment (prevents arms clipping into body)
function _adjustArmSpread(vrm) {
  const h = vrm.humanoid;
  if (!h) return;
  const L = h.getNormalizedBoneNode('leftUpperArm');
  const R = h.getNormalizedBoneNode('rightUpperArm');
  if (L) { L.rotation.z -= 0.15; L.rotation.x += 0.05; }
  if (R) { R.rotation.z += 0.15; R.rotation.x += 0.05; }
}

// Manual idle pose fallback (same as index.html)
function _applyManualIdlePose(vrm) {
  const h = vrm.humanoid;
  if (!h) return;
  const DEG = Math.PI / 180;
  const poses = {
    leftShoulder: { z: 10 * DEG }, rightShoulder: { z: -10 * DEG },
    leftUpperArm: { z: 65 * DEG }, rightUpperArm: { z: -65 * DEG },
    leftLowerArm: { z: 3 * DEG, y: 5 * DEG }, rightLowerArm: { z: -3 * DEG, y: -5 * DEG },
    leftHand: { z: 5 * DEG }, rightHand: { z: -5 * DEG },
    spine: { x: -1 * DEG }, head: { x: 3 * DEG },
  };
  for (const [boneName, rot] of Object.entries(poses)) {
    const node = h.getNormalizedBoneNode(boneName);
    if (!node) continue;
    if (rot.x) node.rotation.x = rot.x;
    if (rot.y) node.rotation.y = rot.y;
    if (rot.z) node.rotation.z = rot.z;
  }
  console.log('[Fallback] Manual idle pose applied');
}

// Mood → FBX mapping (idle loops + one-shot actions)
const MOOD_FBX = {
  idle:      'https://nvatar.nskit.io/static/fbx/mixamo/Idle_Default.fbx',
  happy:     'https://nvatar.nskit.io/static/fbx/mixamo/Idle_Happy.fbx',
  sad:       'https://nvatar.nskit.io/static/fbx/mixamo/Idle_Sad.fbx',
  think:     'https://nvatar.nskit.io/static/fbx/mixamo/Idle_Thinking.fbx',
  lookAround:'https://nvatar.nskit.io/static/fbx/mixamo/Idle_LookAround.fbx',
  weightShift:'https://nvatar.nskit.io/static/fbx/mixamo/Idle_WeightShift.fbx',
};
// One-shot gesture FBX (play once, return to idle)
const GESTURE_FBX = {
  wave:    'https://nvatar.nskit.io/static/fbx/mixamo/Gesture_Wave.fbx',
  nod:     'https://nvatar.nskit.io/static/fbx/mixamo/Gesture_Nod.fbx',
  laugh:   'https://nvatar.nskit.io/static/fbx/mixamo/Emotion_Laugh.fbx',
  cheer:   'https://nvatar.nskit.io/static/fbx/mixamo/Emotion_Cheer.fbx',
  surprised:'https://nvatar.nskit.io/static/fbx/mixamo/Emotion_Surprised.fbx',
};
let moodActions = {};     // { idle: Action, happy: Action, ... }
let gestureActions = {};  // { wave: Action, nod: Action, ... }
let currentMoodName = 'idle';

async function loadMixamoAnimations(vrm) {
  try {
    // Load mood idles + gestures + walking
    for (const [name, path] of Object.entries(MOOD_FBX)) {
      await loadMixamoAnimation(path, vrm, name);
    }
    for (const [name, path] of Object.entries(GESTURE_FBX)) {
      await loadMixamoAnimation(path, vrm, 'gesture_' + name);
    }
    await loadMixamoAnimation('https://nvatar.nskit.io/static/fbx/mixamo/Walk_Default.fbx', vrm, 'walking');
    console.log(`[Mixamo] All animations loaded (${Object.keys(mixamoClips).length} clips)`);

    // Setup mixer
    const avatar = avatars[0];
    if (!avatar) return;

    currentMixer = new THREE.AnimationMixer(avatar.scene);

    // Create actions for mood clips (loop) + gesture clips (once)
    for (const name of Object.keys(MOOD_FBX)) {
      if (mixamoClips[name]) {
        moodActions[name] = currentMixer.clipAction(mixamoClips[name]);
        moodActions[name].loop = THREE.LoopRepeat;
      }
    }
    for (const name of Object.keys(GESTURE_FBX)) {
      const clipName = 'gesture_' + name;
      if (mixamoClips[clipName]) {
        gestureActions[name] = currentMixer.clipAction(mixamoClips[clipName]);
        gestureActions[name].loop = THREE.LoopOnce;
        gestureActions[name].clampWhenFinished = true;
      }
    }

    // Start with idle
    if (moodActions.idle) {
      idleAction = moodActions.idle;
      idleAction.play();
      currentAction = idleAction;
      currentMoodName = 'idle';
    }

    if (mixamoClips.walking) {
      walkAction = currentMixer.clipAction(mixamoClips.walking);
    }

    avatar._useMixamo = true;
    console.log('[Mixamo] Mood actions:', Object.keys(moodActions).join(', '));
  } catch(e) {
    console.error('[Mixamo] Load failed, falling back to manual pose:', e);
    // Fallback: manual bone rotation (works for all VRM)
    const avatar = avatars[0];
    if (avatar && avatar.vrm) _applyManualIdlePose(avatar.vrm);
  }
}

function switchToWalk() {
  if (!walkAction || !currentAction) return;
  if (currentAction === walkAction) return;
  walkAction.reset().play();
  walkAction.crossFadeFrom(currentAction, 0.3, true);
  currentAction = walkAction;
}

function switchToIdle() {
  if (!currentAction) return;
  const targetIdle = moodActions[currentMoodName] || idleAction;
  if (!targetIdle || currentAction === targetIdle) return;
  targetIdle.reset().play();
  targetIdle.crossFadeFrom(currentAction, 0.3, true);
  currentAction = targetIdle;
}

// --- One-shot Gesture (play once, auto-return to current mood idle) ---
function playGesture(name) {
  const action = gestureActions[name];
  if (!action || !currentMixer || walkState === 'walking') return;

  action.reset().play();
  if (currentAction && currentAction !== action) {
    action.crossFadeFrom(currentAction, 0.3, true);
  }
  currentAction = action;

  // When gesture finishes, return to mood idle
  const onFinish = () => {
    currentMixer.removeEventListener('finished', onFinish);
    const returnAction = moodActions[currentMoodName] || idleAction;
    if (returnAction) {
      returnAction.reset().play();
      returnAction.crossFadeFrom(action, 0.3, true);
      currentAction = returnAction;
    }
  };
  currentMixer.addEventListener('finished', onFinish);
}

// --- Viewport-aware roaming bounds ---
function _getVisibleRoamBounds() {
  // Check avatar's full height (head at Y=1.85) visibility, not just floor
  const margin = 0.25; // 25% margin from edges — keep avatar well inside view
  const roomBnd = {
    minX: ROOM_BOUNDS.minX * 0.5, maxX: ROOM_BOUNDS.maxX * 0.5,
    minZ: ROOM_BOUNDS.minZ * 0.5, maxZ: ROOM_BOUNDS.maxZ * 0.5,
  };
  let visMinX = roomBnd.maxX, visMaxX = roomBnd.minX;
  let visMinZ = roomBnd.maxZ, visMaxZ = roomBnd.minZ;
  const steps = 8;
  for (let gx = 0; gx <= steps; gx++) {
    for (let gz = 0; gz <= steps; gz++) {
      const wx = roomBnd.minX + (roomBnd.maxX - roomBnd.minX) * (gx / steps);
      const wz = roomBnd.minZ + (roomBnd.maxZ - roomBnd.minZ) * (gz / steps);
      // Check both feet (Y=0) and head (Y=1.85) are visible
      const feet = new THREE.Vector3(wx, 0, wz).project(camera);
      const head = new THREE.Vector3(wx, 1.85, wz).project(camera);
      const fsx = feet.x * 0.5 + 0.5, fsy = -feet.y * 0.5 + 0.5;
      const hsx = head.x * 0.5 + 0.5, hsy = -head.y * 0.5 + 0.5;
      const feetOk = fsx > margin && fsx < 1 - margin && fsy > margin && fsy < 1 - margin && feet.z < 1;
      const headOk = hsx > margin && hsx < 1 - margin && hsy > 0 && hsy < 1 - margin && head.z < 1;
      if (feetOk && headOk) {
        if (wx < visMinX) visMinX = wx;
        if (wx > visMaxX) visMaxX = wx;
        if (wz < visMinZ) visMinZ = wz;
        if (wz > visMaxZ) visMaxZ = wz;
      }
    }
  }
  if (visMinX >= visMaxX || visMinZ >= visMaxZ) {
    return { minX: -0.3, maxX: 0.3, minZ: -0.2, maxZ: 0.2 };
  }
  return { minX: visMinX, maxX: visMaxX, minZ: visMinZ, maxZ: visMaxZ };
}

// --- Autonomous Roaming ---
const ROAM = {
  enabled: true,
  minWait: 8,     // 최소 대기 (초)
  maxWait: 20,    // 최대 대기 (초)
  boundary: { minX: -1.8, maxX: 1.8, minZ: -1.2, maxZ: 1.5 },
  idleVariants: ['idle', 'lookAround', 'weightShift'],  // 랜덤 idle 변형
  lastActivity: 0,  // 마지막 활동 시간 (사용자 입력 or 대화)
  pauseAfterChat: 10,  // 대화 후 대기 시간 (초)
};
let roamTimer = null;
let roamActive = false;

function startRoaming() {
  if (roamTimer) return;
  roamActive = true;
  scheduleNextRoam();
  console.log('[Roam] Started autonomous roaming');
}

function scheduleNextRoam() {
  if (!roamActive) return;
  const delay = (ROAM.minWait + Math.random() * (ROAM.maxWait - ROAM.minWait)) * 1000;
  roamTimer = setTimeout(() => {
    roamTimer = null;
    doRoamAction();
  }, delay);
}

function doRoamAction() {
  if (!roamActive || walkState === 'walking') { scheduleNextRoam(); return; }

  // 대화 직후에는 가만히 있기
  const timeSinceActivity = (Date.now() - ROAM.lastActivity) / 1000;
  if (timeSinceActivity < ROAM.pauseAfterChat) { scheduleNextRoam(); return; }

  // 50% 확률로 이동, 50% 확률로 idle 변형
  if (Math.random() < 0.5) {
    // 랜덤 포인트로 이동
    const bnd = _getVisibleRoamBounds();
    const tx = bnd.minX + Math.random() * (bnd.maxX - bnd.minX);
    const tz = bnd.minZ + Math.random() * (bnd.maxZ - bnd.minZ);
    walkTarget = { x: tx, z: tz };
    walkState = 'walking';
  } else {
    // 랜덤 idle 변형 재생
    const variant = ROAM.idleVariants[Math.floor(Math.random() * ROAM.idleVariants.length)];
    if (variant !== currentMoodName) {
      _crossfadeToMood(variant);
      // 몇 초 후 기본 idle로 복귀
      setTimeout(() => {
        if (walkState !== 'walking' && currentMoodName === variant) {
          _crossfadeToMood('idle');
        }
      }, 5000 + Math.random() * 5000);
    }
  }

  scheduleNextRoam();
}

function pauseRoaming() {
  ROAM.lastActivity = Date.now();
  _pauseMonologue();
}

// --- Monologue (혼잣말) ---
const MONO = {
  minInterval: 30,
  maxInterval: 60,
  pauseAfterChat: 20,
};
let monoTimer = null;
let monoActive = false;

function startMonologue() {
  if (monoActive) return;
  monoActive = true;
  _scheduleMonologue();
  console.log('[Mono] Started monologue routine');
}

function _scheduleMonologue() {
  if (!monoActive) return;
  const delay = (MONO.minInterval + Math.random() * (MONO.maxInterval - MONO.minInterval)) * 1000;
  monoTimer = setTimeout(_requestMonologue, delay);
}

function _requestMonologue() {
  monoTimer = null;
  if (!monoActive) return;
  const sinceActivity = (Date.now() - ROAM.lastActivity) / 1000;
  if (sinceActivity < MONO.pauseAfterChat) { _scheduleMonologue(); return; }
  if (chatWs && chatWs.readyState === 1) {
    chatWs.send(JSON.stringify({ type: 'monologue_request' }));
  }
  _scheduleMonologue();
}

function _pauseMonologue() {
  if (monoTimer) { clearTimeout(monoTimer); monoTimer = null; }
  if (monoActive) _scheduleMonologue();
}

// 대화 시 카메라 앞으로 걸어오기
function _getCameraFrontPos() {
  // orbit target에서 카메라 방향으로 1.2유닛 = 카메라 앞 위치
  const tx = controls.target.x, tz = controls.target.z;
  const cx = camera.position.x, cz = camera.position.z;
  const dx = cx - tx, dz = cz - tz;
  const dist = Math.sqrt(dx * dx + dz * dz);
  if (dist < 0.1) return { x: tx, z: tz };
  let rx = tx + (dx / dist) * 1.2;
  let rz = tz + (dz / dist) * 1.2;
  // Clamp to room bounds
  rx = Math.max(ROOM_BOUNDS.minX + 0.3, Math.min(ROOM_BOUNDS.maxX - 0.3, rx));
  rz = Math.max(ROOM_BOUNDS.minZ + 0.3, Math.min(ROOM_BOUNDS.maxZ - 0.3, rz));
  return { x: rx, z: rz };
}

function _faceCamera(model) {
  const camPos = camera.position;
  model.rotation.y = Math.atan2(
    camPos.x - model.position.x,
    camPos.z - model.position.z
  ) + Math.PI;
}

function returnToCenter() {
  const avatar = avatars[0];
  if (!avatar || !avatar.scene) return;
  const model = avatar.scene;
  const front = _getCameraFrontPos();
  const dx = front.x - model.position.x;
  const dz = front.z - model.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);

  console.log('[returnToCenter]',
    'cam:', camera.position.x.toFixed(2), camera.position.y.toFixed(2), camera.position.z.toFixed(2),
    '| target:', controls.target.x.toFixed(2), controls.target.y.toFixed(2), controls.target.z.toFixed(2),
    '| avatar:', model.position.x.toFixed(2), model.position.z.toFixed(2),
    '| walkTo:', front.x.toFixed(2), front.z.toFixed(2),
    '| dist:', dist.toFixed(2),
    '| rot:', model.rotation.y.toFixed(2)
  );

  if (dist < 0.3) {
    _faceCamera(model);
    console.log('[returnToCenter] Already close, faceCamera rot:', model.rotation.y.toFixed(2));
    return;
  }

  walkTarget = { x: front.x, z: front.z };
  walkState = 'walking';
  avatar._returnToCenter = true;
}

// --- Click-to-Walk ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let walkTarget = null; // {x, z}
let walkState = 'idle'; // 'idle' | 'walking'
const WALK_SPEED = 1.0; // units per second
const ROOM_BOUNDS = { minX: -2.5, maxX: 2.5, minZ: -2, maxZ: 2 };

document.addEventListener('dblclick', (event) => {
  if (!renderer) return;
  pauseRoaming();  // 사용자가 이동시키면 자율이동 잠시 멈춤
  // Double-click to move
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Create invisible floor plane for raycasting
  const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const intersectPoint = new THREE.Vector3();
  raycaster.ray.intersectPlane(floorPlane, intersectPoint);

  if (intersectPoint) {
    // Clamp to room bounds
    const tx = Math.max(ROOM_BOUNDS.minX, Math.min(ROOM_BOUNDS.maxX, intersectPoint.x));
    const tz = Math.max(ROOM_BOUNDS.minZ, Math.min(ROOM_BOUNDS.maxZ, intersectPoint.z));
    console.log('[dblclick] floor hit:', tx.toFixed(2), tz.toFixed(2),
      '| cam:', camera.position.x.toFixed(2), camera.position.z.toFixed(2));
    walkTarget = { x: tx, z: tz };
    walkState = 'walking';

    // Visual indicator — small circle on floor
    showWalkIndicator(tx, tz);
  }
});

let walkIndicator = null;
function showWalkIndicator(x, z) {
  if (walkIndicator) scene.remove(walkIndicator);
  const geo = new THREE.RingGeometry(0.08, 0.12, 16);
  const mat = new THREE.MeshBasicMaterial({ color: 0x6366f1, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
  walkIndicator = new THREE.Mesh(geo, mat);
  walkIndicator.rotation.x = -Math.PI / 2;
  walkIndicator.position.set(x, 0.01, z);
  scene.add(walkIndicator);
  setTimeout(() => { if (walkIndicator) { scene.remove(walkIndicator); walkIndicator = null; } }, 2000);
}

// AABB collision check — avatar radius ~0.3
function checkCollision(x, z) {
  const avatarBox = new THREE.Box3(
    new THREE.Vector3(x - 0.3, 0, z - 0.3),
    new THREE.Vector3(x + 0.3, 1.5, z + 0.3)
  );
  for (const objBox of ROOM_OBJECTS) {
    if (avatarBox.intersectsBox(objBox)) return true;
  }
  return false;
}

function updateWalk(delta) {
  const avatar = avatars[0];
  if (!avatar || !avatar.vrm || !avatar.scene) return;
  const model = avatar.scene;

  if (walkState !== 'walking' || !walkTarget) return;

  const dx = walkTarget.x - model.position.x;
  const dz = walkTarget.z - model.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);

  const step = WALK_SPEED * delta;

  if (dist <= step || dist < 0.05) {
    model.position.x = walkTarget.x;
    model.position.z = walkTarget.z;
    // Y untouched — stays at 0
    walkTarget = null;
    walkState = 'idle';
    // 카메라 앞 도착 → 카메라 바라보기
    if (avatar._returnToCenter) {
      _faceCamera(model);
      console.log('[arrived] faceCamera rot:', model.rotation.y.toFixed(2),
        '| cam:', camera.position.x.toFixed(2), camera.position.z.toFixed(2),
        '| model:', model.position.x.toFixed(2), model.position.z.toFixed(2));
      avatar._returnToCenter = false;
    }
    switchToIdle();
    return;
  }
  const nx = dx / dist;
  const nz = dz / dist;
  const newX = model.position.x + nx * step;
  const newZ = model.position.z + nz * step;

  // Collision check against indoor furniture
  if (!checkCollision(newX, newZ)) {
    model.position.x = newX;
    model.position.z = newZ;
  } else {
    walkTarget = null;
    walkState = 'idle';
    switchToIdle();
    return;
  }
  // Don't touch Y during walk — keep initial position

  const angle = Math.atan2(nx, nz);
  model.rotation.y = angle + Math.PI;

  switchToWalk();
}

function applyWalkCycle(avatar, time) {
  const vrm = avatar.vrm;
  if (!vrm.humanoid) return;
  const speed = 8; // cycle speed
  const t = time * speed;

  // Legs
  const leftUpper = vrm.humanoid.getNormalizedBoneNode('leftUpperLeg');
  const rightUpper = vrm.humanoid.getNormalizedBoneNode('rightUpperLeg');
  const leftLower = vrm.humanoid.getNormalizedBoneNode('leftLowerLeg');
  const rightLower = vrm.humanoid.getNormalizedBoneNode('rightLowerLeg');

  if (leftUpper) leftUpper.rotation.x = Math.sin(t) * 0.4;
  if (rightUpper) rightUpper.rotation.x = Math.sin(t + Math.PI) * 0.4;
  if (leftLower) leftLower.rotation.x = Math.max(0, Math.sin(t + 0.5)) * 0.5;
  if (rightLower) rightLower.rotation.x = Math.max(0, Math.sin(t + Math.PI + 0.5)) * 0.5;

  // Arms swing
  const leftArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
  const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
  if (leftArm) leftArm.rotation.x = Math.sin(t + Math.PI) * 0.2;
  if (rightArm) rightArm.rotation.x = Math.sin(t) * 0.2;

  // Body sway
  const spine = vrm.humanoid.getNormalizedBoneNode('spine');
  if (spine) {
    spine.rotation.y = Math.sin(t) * 0.03;
    spine.rotation.x = 0.02; // slight forward lean
  }
}

function resetBonesToIdle(avatar) {
  const vrm = avatar.vrm;
  if (!vrm.humanoid) return;
  const bones = ['leftUpperLeg', 'rightUpperLeg', 'leftLowerLeg', 'rightLowerLeg', 'leftUpperArm', 'rightUpperArm'];
  bones.forEach(name => {
    const bone = vrm.humanoid.getNormalizedBoneNode(name);
    if (bone) { bone.rotation.x = 0; bone.rotation.y = 0; bone.rotation.z = 0; }
  });
}

const TTS_CONFIG = { volume: 0.67, enabled: true };
const ttsQueue = [];

function stopTTS() {
  // 사용자가 새 메시지 보낼 때 — 큐 비우고 현재 재생 중단

window._changeLang = async function(lang) {
  if (!currentAvatarId) { addChatMsg('system', t('noAvatar')); return; }
  try {
    const r = await fetch(`https://nvatar.nskit.io/api/v1/avatars/${currentAvatarId}/language`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: lang }),
    });
    const d = await r.json();
    if (d.code === 200) {
      // Reload page with new lang — all i18n + routing fresh from start
      const url = new URL(window.location.href);
      url.searchParams.set('lang', lang);
      window.location.replace(url.toString());
    }
  } catch (e) {
    addChatMsg('system', t('langChangeFailed'));
  }
};

window._toggleTTS = function(btn) {

  btn.textContent = TTS_CONFIG.enabled ? t('ttsOn') : t('ttsOff');

  console.log('[TTS] enabled:', TTS_CONFIG.enabled);
};

async function speakTTS(text) {
  if (!TTS_CONFIG.enabled || !text || text === '...') return;
  ttsQueue.push(text);
  if (!ttsPlaying) processQueue();
}

async function processQueue() {
  if (ttsQueue.length === 0) { ttsPlaying = false; _onTTSComplete(); return; }
  ttsPlaying = true;
  const text = ttsQueue.shift();
  try {
    const res = await fetch(`https://nvatar.nskit.io/api/v1/tts?text=${encodeURIComponent(text)}`, { method: 'POST' });
    if (!res.ok) { processQueue(); return; }
    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    audio.volume = TTS_CONFIG.volume;
    audio.onended = () => { ttsCurrentAudio = null; processQueue(); };
    audio.onerror = () => { ttsCurrentAudio = null; processQueue(); };
    ttsCurrentAudio = audio;
    audio.play();
  } catch (e) {
    console.warn('[TTS] Error:', e.message);
    processQueue();
  }
}

// --- NVatar WebSocket Chat ---
let chatWs = null;
let currentAvatarId = null;

function connectChat(avatarId) {
  if (chatWs) chatWs.close();
  currentAvatarId = avatarId;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  chatWs = new WebSocket(`${proto}//nvatar.nskit.io/ws/chat/${avatarId}`);

  chatWs.onopen = () => {
    addChatMsg('system', t('connected'));
  };

  chatWs.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'bubble_lookup') {
      addLookupResult(data);
      if (NVatarSDK.onLookupResult) NVatarSDK.onLookupResult(data);
    } else if (data.type === 'bubble') {
      addChatMsg('avatar', data.text);
      showBubble(0, data.text);
      speakTTS(data.text); // 버블 단위 TTS (큐 순차재생)
      const mood = detectMoodFromText(data.text);
      if (mood) {
        setMood(mood);
        const gesture = detectGestureFromText(data.text);
        if (gesture) setTimeout(() => playGesture(gesture), 500);
      }
      pauseRoaming();
    } else if (data.type === 'typing') {
      showBubble(0, '...');
      returnToCenter();  // 대답 준비 — 중앙으로 이동
      pauseRoaming();
    } else if (data.type === 'proactive') {
      showBubble(0, data.message);
      addChatMsg('avatar', data.message);
      speakTTS(data.message);
      const mood = detectMoodFromText(data.message);
      if (mood) setMood(mood);
    } else if (data.type === 'monologue') {
      showBubble(0, data.text);
      addChatMsg('avatar', data.text);
      const mood = detectMoodFromText(data.text);
      if (mood) setMood(mood);
    } else if (data.type === 'emotion_update' && data.emotions) {
      const emo = data.emotions;
      if (emo.joy > 65) { setMood('happy'); playGesture('cheer'); }
      else if (emo.sadness > 50) setMood('sad');
      else if (emo.excitement > 60) { setMood('happy'); playGesture('wave'); }
    }
  };

  chatWs.onclose = () => {
    addChatMsg('system', t('disconnected'));
  };
}

function addChatMsg(role, text) {
  const container = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  if (role === 'user') {
    el.style.cssText = 'align-self:flex-end;background:#6366f1;color:#fff;padding:6px 12px;border-radius:12px;border-bottom-right-radius:2px;font-size:12px;max-width:80%;word-break:break-word;';
  } else if (role === 'avatar') {
    el.style.cssText = 'align-self:flex-start;background:rgba(30,41,59,0.95);color:#e2e8f0;padding:6px 12px;border-radius:12px;border-bottom-left-radius:2px;font-size:12px;max-width:80%;border:1px solid #334155;word-break:break-word;';
  } else if (role === 'lookup') {
    el.style.cssText = 'align-self:flex-start;background:rgba(20,30,48,0.9);color:#94a3b8;padding:8px 12px;border-radius:8px;font-size:11px;max-width:85%;border-left:3px solid #475569;word-break:break-word;';
    el.textContent = t('lookupPrefix') + text;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return;
  } else {
    el.style.cssText = 'align-self:center;color:#64748b;font-size:10px;padding:2px;';
  }
  el.textContent = text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// --- NVatar SDK: Lookup Results ---
// 검색 결과를 수집하고 SDK 사용측에 제공.
// room-demo는 SDK를 직접 구현하여 배지+패널 UI를 제공하는 레퍼런스 구현.
window.NVatarSDK = window.NVatarSDK || {};

const _lookupStore = [];
let _lookupUnread = 0;
let _badgeBlink = null;

// SDK Core API
NVatarSDK.onLookupResult = null;
NVatarSDK.getLookupResults = () => [..._lookupStore];
NVatarSDK.getUnreadCount = () => _lookupUnread;
NVatarSDK.clearLookupResults = () => { _lookupStore.length = 0; _lookupUnread = 0; _updateBadge(); };

function addLookupResult(data) {
  // data: { query, text, items } or plain string (legacy)
  const result = typeof data === 'string'
    ? { query: '', text: data, items: [{ title: data.slice(0, 60), summary: data }], ts: new Date().toISOString(), read: false }
    : { ...data, ts: new Date().toISOString(), read: false };

  _lookupStore.push(result);
  _lookupUnread++;
  _updateBadge();
  _renderLookupItem(result, _lookupStore.length - 1);
  console.log(`[Lookup] #${_lookupStore.length}: ${result.query || result.text?.slice(0, 40)}`);
}

function _updateBadge() {
  const badge = document.getElementById('lookupBadge');
  const count = document.getElementById('lookupBadgeCount');
  if (_lookupStore.length === 0) {
    badge.style.display = 'none';
    if (_badgeBlink) { clearInterval(_badgeBlink); _badgeBlink = null; }
    return;
  }
  badge.style.display = '';
  badge.innerHTML = `${t('lookupResult')} <span id="lookupBadgeCount">${_lookupStore.length}</span>${t('lookupCount')}`;

  // Blink if unread
  if (_lookupUnread > 0 && !_badgeBlink) {
    _badgeBlink = setInterval(() => {
      badge.style.opacity = badge.style.opacity === '0.4' ? '1' : '0.4';
    }, 600);
  } else if (_lookupUnread === 0 && _badgeBlink) {
    clearInterval(_badgeBlink);
    _badgeBlink = null;
    badge.style.opacity = '1';
  }
}

window.toggleLookupPanel = function(e) {
  if (e) e.stopPropagation();
  const panel = document.getElementById('lookupPanel');
  const show = panel.style.display !== 'flex';
  panel.style.display = show ? 'flex' : 'none';
  // 열릴 때 모든 아코디언 접기
  if (show) {
    panel.querySelectorAll('#lookupList > div > div:last-child').forEach(c => { c.style.display = 'none'; });
  }
};

function _renderLookupItem(result, idx) {
  const list = document.getElementById('lookupList');
  const item = document.createElement('div');
  item.id = 'lookup-' + idx;
  item.style.cssText = 'background:rgba(15,23,42,0.9);border:1px solid #334155;border-radius:8px;overflow:hidden;';
  if (!result.read) item.style.borderLeftColor = '#6366f1';
  item.style.borderLeftWidth = '3px';

  // Header (query + time)
  const header = document.createElement('div');
  header.style.cssText = 'padding:8px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;';
  const queryText = result.query || (result.items?.[0]?.title) || t('lookupDefaultTitle');
  header.innerHTML = `
    <span style="font-size:12px;color:${result.read ? '#94a3b8' : '#e2e8f0'};font-weight:${result.read ? '400' : '600'};">${queryText.slice(0, 45)}</span>
    <span style="font-size:9px;color:#475569;">${result.ts?.slice(11, 16) || ''}</span>
  `;

  // Content (items)
  const content = document.createElement('div');
  content.style.cssText = 'padding:0 10px 10px;display:none;';

  if (result.items && result.items.length > 0) {
    result.items.forEach(it => {
      const row = document.createElement('div');
      row.style.cssText = 'margin-bottom:6px;padding:6px 8px;background:rgba(30,41,59,0.6);border-radius:6px;';
      row.innerHTML = `
        <div style="font-size:11px;color:#e2e8f0;font-weight:600;margin-bottom:2px;">${it.title}</div>
        ${it.summary ? `<div style="font-size:10px;color:#94a3b8;line-height:1.5;">${it.summary}</div>` : ''}
      `;
      content.appendChild(row);
    });
  } else {
    content.innerHTML = `<div style="font-size:11px;color:#94a3b8;line-height:1.5;white-space:pre-wrap;">${result.text || ''}</div>`;
  }

  header.addEventListener('click', (e) => {
    e.stopPropagation();
    const show = content.style.display === 'none';
    content.style.display = show ? 'block' : 'none';
    if (show && !result.read) {
      result.read = true;
      _lookupUnread = Math.max(0, _lookupUnread - 1);
      item.style.borderLeftColor = '#334155';
      header.querySelector('span').style.color = '#94a3b8';
      header.querySelector('span').style.fontWeight = '400';
      _updateBadge();
    }
  });

  item.appendChild(header);
  item.appendChild(content);
  list.insertBefore(item, list.firstChild);
}

// --- Voice Recording + Whisper STT ---
const WHISPER_URL = 'https://whisper.nskit.io/api/v1/transcribe';
const MAX_RECORD_SEC = 20;
let micRecorder = null;
let micChunks = [];
let micTimerInterval = null;
let micSec = 0;
let micRecording = false;

window.toggleMic = function() {
  micRecording ? stopMic() : startMic();
};

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    micRecorder = new MediaRecorder(stream, { mimeType });

    micRecorder.ondataavailable = e => { if (e.data.size > 0) micChunks.push(e.data); };
    micRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      if (micChunks.length > 0) transcribeAudio();
    };

    micRecorder.start();
    micRecording = true;
    micSec = 0;
    document.getElementById('micBtn').style.background = 'rgba(239,68,68,0.2)';
    document.getElementById('micBtn').style.borderColor = '#ef4444';
    document.getElementById('micTimer').style.display = '';
    updateMicDisplay();
    micTimerInterval = setInterval(() => {
      micSec++;
      updateMicDisplay();
      if (micSec >= MAX_RECORD_SEC) stopMic();
    }, 1000);
  } catch (e) {
    console.error('[STT] Mic error:', e);
    addChatMsg('system', t('micPermission') + ': ' + e.message);
  }
}

function stopMic() {
  if (micRecorder && micRecorder.state === 'recording') micRecorder.stop();
  micRecording = false;
  clearInterval(micTimerInterval);
  document.getElementById('micBtn').style.background = 'rgba(15,23,42,0.9)';
  document.getElementById('micBtn').style.borderColor = '#334155';
  document.getElementById('micTimer').style.display = 'none';
}

function updateMicDisplay() {
  document.getElementById('micTimer').textContent = Math.floor(micSec / 60) + ':' + String(micSec % 60).padStart(2, '0');
}

async function transcribeAudio() {
  const ext = micRecorder.mimeType.includes('webm') ? 'webm' : 'm4a';
  const file = new File(micChunks, 'voice.' + ext, { type: micRecorder.mimeType });

  addChatMsg('system', t('micListening'));

  try {
    const formData = new FormData();
    formData.append('file', file);
    const resp = await fetch(WHISPER_URL, { method: 'POST', body: formData });
    const data = await resp.json();

    if (data.code === 200 && data.text?.trim()) {
      document.getElementById('chatInput').value = data.text.trim();
      sendChat(); // 자동 전송
    } else {
      addChatMsg('system', t('micNoResult'));
    }
  } catch (e) {
    addChatMsg('system', t('micServerFail'));
  }
}

window.sendChat = function() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // 사용자가 말하면 아바타 TTS 중단
  stopTTS();

  // Show in chat overlay
  addChatMsg('user', text);

  // Send via WebSocket if connected
  if (chatWs && chatWs.readyState === 1) {
    chatWs.send(JSON.stringify({ type: 'message', text }));
    returnToCenter();
    pauseRoaming();
    showBubble(0, '...');  // thinking indicator on avatar
  } else {
    addChatMsg('system', t('noAvatarSend'));
  }
};

// Avatar is loaded via URL params (?avatar=ID&vrm=URL)
// No selector needed — avatar is chosen in the lobby (index.html)

// --- Animate ---
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  elapsed += delta;
  if (controls) controls.update();

  // Mixamo mixer update
  if (currentMixer) { currentMixer.update(delta); if (avatars[0] && avatars[0].vrm) _adjustArmSpread(avatars[0].vrm); }

  // Walk system
  updateWalk(delta);

  // Avatar animations
  avatars.forEach((avatar, i) => {
    if (!avatar || !avatar.vrm) return;
    const vrm = avatar.vrm;

    // Auto blink
    avatar.blinkTimer += delta;
    if (avatar.blinkTimer > avatar.nextBlink) {
      if (vrm.expressionManager) {
        const blinkVal = Math.sin((avatar.blinkTimer - avatar.nextBlink) * 16) * 0.5 + 0.5;
        vrm.expressionManager.setValue('blink', blinkVal > 0.8 ? 1 : 0);
        if (avatar.blinkTimer > avatar.nextBlink + 0.2) {
          avatar.blinkTimer = 0;
          avatar.nextBlink = 2 + Math.random() * 5;
          vrm.expressionManager.setValue('blink', 0);
        }
      }
    }

    // Idle breathing
    if (vrm.humanoid) {
      const spine = vrm.humanoid.getNormalizedBoneNode('spine');
      if (spine) {
        spine.rotation.x = Math.sin(elapsed * 1.2) * 0.008;
        spine.rotation.z = Math.sin(elapsed * 0.5) * 0.003;
      }
    }

    // Wave animation
    if (avatar._waveAnim) {
      const t = (elapsed - avatar._waveAnim.start) / avatar._waveAnim.duration;
      if (t < 1) {
        avatar._waveAnim.bone.rotation.z = -1.2 + Math.sin(t * Math.PI * 4) * 0.3;
      } else {
        avatar._waveAnim.bone.rotation.z = 0;
        avatar._waveAnim = null;
      }
    }

    // Think animation (head tilt)
    if (avatar._thinkAnim) {
      const t = (elapsed - avatar._thinkAnim.start) / avatar._thinkAnim.duration;
      if (t < 1) {
        avatar._thinkAnim.bone.rotation.z = Math.sin(t * Math.PI) * 0.15;
        avatar._thinkAnim.bone.rotation.x = Math.sin(t * Math.PI * 0.5) * 0.1;
      } else {
        avatar._thinkAnim = null;
      }
    }

    // Nod animation
    if (avatar._nodAnim) {
      const t = (elapsed - avatar._nodAnim.start) / avatar._nodAnim.duration;
      if (t < 1) {
        avatar._nodAnim.bone.rotation.x = Math.sin(t * Math.PI * 3) * 0.15;
      } else {
        avatar._nodAnim = null;
      }
    }

    vrm.update(delta);
  });

  renderer.render(scene, camera);

  // Update bubble positions (3D → 2D screen projection)
  updateBubblePositions();
}

// --- Mobile: Chat Fade System ---
const _isMobile = () => window.innerWidth <= 768;
let _chatFadeTimer = null;
let _chatState = 'idle';
let _chatConversing = false;

function _chatEnterIdle() {
  if (!_isMobile()) return;
  _chatState = 'fading';
  const msgs = document.getElementById('chatMessages');
  // Start gradient sweep animation
  msgs.classList.add('chat-sweep-fade');
  // After animation ends → fully idle
  setTimeout(() => {
    msgs.classList.remove('chat-sweep-fade');
    const overlay = document.getElementById('chatOverlay');
    overlay.classList.add('chat-idle');
    overlay.querySelectorAll('.chat-active-msg').forEach(el => el.classList.remove('chat-active-msg'));
    _chatState = 'idle';
  }, 5000);
}

function _chatStartFadeTimer() {
  clearTimeout(_chatFadeTimer);
  if (!_isMobile()) return;
  console.log('[fade] startFadeTimer (5s)');
  _chatFadeTimer = setTimeout(() => {
    console.log('[fade] timer fired → entering idle');
    _chatConversing = false;
    _chatState = 'fading';
    _chatEnterIdle();
  }, 5000);
}

function _onBubbleComplete() {
  console.log('[fade] _onBubbleComplete', 'mobile:', _isMobile(), 'state:', _chatState, 'conversing:', _chatConversing);
  if (!_isMobile() || _chatState !== 'active') return;
  _chatConversing = false;
  _chatStartFadeTimer();
}

function _onTTSComplete() {
  if (!_isMobile() || _chatState !== 'active') return;
  _chatConversing = false;
  _chatStartFadeTimer();
}

function _chatShowMsg(el) {
  if (!_isMobile()) return;
  // Stop any ongoing sweep
  const msgs = document.getElementById('chatMessages');
  msgs.classList.remove('chat-sweep-fade');
  msgs.style.opacity = '1';
  msgs.style.webkitMaskImage = '';
  msgs.style.maskImage = '';
  // Ensure idle class (hides old messages)
  const overlay = document.getElementById('chatOverlay');
  if (!overlay.classList.contains('chat-idle')) overlay.classList.add('chat-idle');
  el.classList.add('chat-active-msg');
  _chatState = 'active';
}

function _chatRevealAll() {
  if (!_isMobile()) return;
  const msgs = document.getElementById('chatMessages');
  msgs.classList.remove('chat-sweep-fade');
  msgs.style.opacity = '1';
  msgs.style.webkitMaskImage = '';
  msgs.style.maskImage = '';
  const overlay = document.getElementById('chatOverlay');
  overlay.classList.remove('chat-idle');
  _chatState = 'active';
  _chatStartFadeTimer();
}

document.addEventListener('DOMContentLoaded', () => {
  const msgs = document.getElementById('chatMessages');
  if (msgs) {
    msgs.addEventListener('scroll', () => { if (_isMobile() && _chatState === 'idle') _chatRevealAll(); }, { passive: true });
    msgs.addEventListener('touchmove', () => { if (_isMobile() && _chatState === 'idle') _chatRevealAll(); }, { passive: true });
  }
});

const _origAddChatMsg = addChatMsg;
addChatMsg = function(role, text) {
  _origAddChatMsg(role, text);
  if (!_isMobile()) return;
  const container = document.getElementById('chatMessages');
  const el = container.lastElementChild;
  if (!el) return;
  if (role === 'user') {
    _chatConversing = true;
    clearTimeout(_chatFadeTimer);
    _chatShowMsg(el);
  } else if (role === 'avatar') {
    _chatShowMsg(el);
    // fade timer starts from _onBubbleComplete or _onTTSComplete
  } else if (role === 'system') {
    _chatShowMsg(el);
    _chatStartFadeTimer();
  }
};
